<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת שליטה בציוד</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ol:#4a5240;--old:#2e3328;--oll:#6b7560;
  --sa:#c8b98a;--sal:#e8dfc0;--sap:#f5f0e0;--kh:#8a8060;
  --re:#c0392b;--rel:#e74c3c;--go:#27ae60;--am:#e67e22;
  --wh:#fafaf8;--dk:#1a1d16;--bo:#d0c8a8;
  --sh:0 4px 24px rgba(30,35,20,.13);--shh:0 8px 40px rgba(30,35,20,.22);
  --r:10px;--rl:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--sap);color:var(--dk);min-height:100vh;direction:rtl}
.hdr{background:var(--old);color:var(--sal);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:56px;box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:100}
.hdr-t{font-size:16px;font-weight:800}.hdr-s{font-size:10px;opacity:.6}
.hbadge{background:var(--sa);color:var(--old);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.nav{background:var(--ol);display:flex;gap:2px;padding:7px 18px 0;overflow-x:auto;scrollbar-width:none}
.ntab{padding:8px 16px;border:none;background:transparent;color:var(--sal);font-family:'Heebo',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px 8px 0 0;transition:all .2s;white-space:nowrap;opacity:.7}
.ntab:hover{opacity:1;background:rgba(255,255,255,.08)}
.ntab.active{background:var(--sap);color:var(--old);opacity:1;font-weight:700}
.scr{display:none;padding:18px;max-width:1200px;margin:0 auto}.scr.on{display:block}
.card{background:var(--wh);border-radius:var(--rl);padding:20px 22px;box-shadow:var(--sh);margin-bottom:16px}
.card h2{font-size:17px;font-weight:800;color:var(--old);margin-bottom:14px}
.card h3{font-size:14px;font-weight:800;color:var(--old);margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:var(--ol);text-transform:uppercase;letter-spacing:.5px}
input,select{font-family:'Heebo',sans-serif;font-size:13px;padding:8px 11px;border:2px solid var(--bo);border-radius:var(--r);background:var(--wh);color:var(--dk);transition:border-color .2s;direction:rtl;width:100%}
input:focus,select:focus{outline:none;border-color:var(--ol)}
.srow{display:grid;grid-template-columns:1fr 1fr auto;gap:9px;align-items:end}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:580px){.srow,.fgrid{grid-template-columns:1fr}}
.btn{font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;padding:8px 18px;border:none;border-radius:var(--r);cursor:pointer;transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.bprim{background:var(--ol);color:var(--wh)}.bprim:hover{background:var(--old)}
.bsec{background:var(--sal);color:var(--old)}.bsec:hover{background:var(--sa)}
.bred{background:var(--re);color:#fff}.bred:hover{background:var(--rel)}
.bgo{background:var(--go);color:#fff}
.bgh{background:transparent;color:var(--ol);border:2px solid var(--bo)}.bgh:hover{border-color:var(--ol)}
.bsm{padding:5px 11px;font-size:12px}
.sh{background:linear-gradient(135deg,var(--old),var(--ol));padding:16px 22px;color:var(--sal);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px;border-radius:var(--rl) var(--rl) 0 0}
.sn{font-size:20px;font-weight:900}
.smeta{display:flex;gap:10px;flex-wrap:wrap;margin-top:3px}
.mi{font-size:12px;opacity:.85}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.brole{background:var(--sa);color:var(--old)}.bplat{background:rgba(255,255,255,.15);color:var(--sal)}
.sb{padding:18px 22px;background:var(--wh);border-radius:0 0 var(--rl) var(--rl)}
.st{font-size:13px;font-weight:800;color:var(--old);margin:0 0 9px;padding-bottom:6px;border-bottom:2px solid var(--bo);display:flex;align-items:center;gap:5px}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
.tbl th{background:var(--old);color:var(--sal);padding:8px 9px;text-align:right;font-size:11px;font-weight:600}
.tbl td{padding:7px 9px;border-bottom:1px solid var(--bo);vertical-align:middle}
.tbl tr:nth-child(even) td{background:var(--sap)}
.tbl tr:hover td{background:rgba(74,82,64,.06)}
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'Heebo',sans-serif;transition:all .15s}
.pok{background:#e8f4e8;color:var(--go)}.pok:hover{background:#d0edda}
.pbad{background:#fde8e6;color:var(--re)}.pbad:hover{background:#fbd5d1}
.ce{background:transparent;border:1px dashed transparent;border-radius:4px;padding:2px 5px;font-family:'Heebo',sans-serif;font-size:12px;width:110px;transition:all .15s}
.ce:focus{border-color:var(--ol);background:#fff;outline:none}
.vok{color:var(--go);font-weight:700}.vmiss{color:var(--re);font-weight:700}
.rdel{opacity:0;transition:opacity .15s;background:none;border:none;cursor:pointer;color:var(--re);font-size:13px;padding:1px 4px}
.tbl tr:hover .rdel{opacity:1}
.dtag{background:#fde8e6;color:var(--re);border:1px solid #f5c6c0;padding:4px 9px;border-radius:20px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.dtag button{background:none;border:none;cursor:pointer;color:var(--re);opacity:.6;font-size:12px;padding:0;line-height:1}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:16px}
.cc{background:var(--wh);border-radius:var(--r);padding:13px 15px;box-shadow:var(--sh);border-right:4px solid var(--ol);cursor:pointer;transition:all .2s}
.cc:hover{transform:translateY(-2px);box-shadow:var(--shh)}
.cc.cmiss{border-color:var(--re)}.cc.cok{border-color:var(--go)}
.ccn{font-size:13px;font-weight:800;color:var(--old)}
.ccs{font-size:11px;color:var(--kh);margin-top:2px}
.ccstats{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.cst{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.csw{background:#e8f0e8;color:var(--ol)}.csm{background:#fde8e6;color:var(--re)}.csg{background:#e8f4e8;color:var(--go)}
.frow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.fb{padding:5px 14px;border:2px solid var(--bo);border-radius:20px;background:#fff;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--ol);transition:all .2s}
.fb.active{background:var(--ol);color:#fff;border-color:var(--ol)}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px;margin-bottom:18px}
.kpi{background:var(--wh);border-radius:var(--r);padding:14px;box-shadow:var(--sh);text-align:center}
.kval{font-size:32px;font-weight:900;color:var(--old);line-height:1}
.klbl{font-size:11px;color:var(--kh);font-weight:600;margin-top:4px}
.kpi.red .kval{color:var(--re)}.kpi.green .kval{color:var(--go)}.kpi.amber .kval{color:var(--am)}
.nk-row{cursor:pointer}
.nk-row:hover td{background:rgba(74,82,64,.09)!important}
.nk-exp{display:none}.nk-exp.open{display:table-row}
.nk-exp td{padding:0!important;border:none!important}
.nk-exp-inner{background:var(--sap);padding:12px 16px;border-bottom:2px solid var(--bo)}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--wh);border:1px solid var(--bo);padding:6px 11px;border-radius:8px;margin:3px;font-size:12px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--ol);background:#f0ede0}
.chip-n{font-weight:800;color:var(--old)}
.chip-m{font-family:monospace;font-size:11px;color:var(--oll);background:var(--sap);padding:2px 6px;border-radius:4px;border:1px solid var(--bo)}
.chip-ok{font-size:11px;color:var(--go)}.chip-bad{font-size:11px;color:var(--re)}
.cnt-badge{background:var(--ol);color:#fff;font-size:11px;font-weight:700;min-width:24px;height:24px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;padding:0 7px}
.delta-pos{color:var(--go);font-weight:700}.delta-neg{color:var(--re);font-weight:700}.delta-zero{color:var(--kh)}
.pbar-wrap{background:var(--bo);border-radius:5px;height:7px;overflow:hidden;flex:1;min-width:60px}
.pbar-fill{height:100%;border-radius:5px;transition:width .4s}
.disc-row{display:flex;align-items:center;gap:9px;margin-bottom:12px;font-size:12px;font-weight:600;color:var(--ol)}
.mover{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px}
.mover.hide{display:none}
.modal{background:var(--wh);border-radius:var(--rl);padding:22px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:var(--shh)}
.modal h3{font-size:15px;font-weight:800;margin-bottom:14px;color:var(--old)}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.sbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--old);color:var(--sal);padding:8px 20px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:var(--shh);z-index:300;transition:opacity .3s;opacity:0;pointer-events:none;white-space:nowrap}
.sbar.on{opacity:1}
.sep{margin:14px 0;border:none;border-top:1px solid var(--bo)}
.nd{text-align:center;padding:24px;color:var(--kh);font-size:13px}

.nk-list-row{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--bo);transition:background .15s;}
.nk-list-row:last-child{border-bottom:none;}
.nk-list-row:hover{background:var(--sap);}
.nk-list-active{background:var(--sal)!important;border-right:3px solid var(--ol);}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loadingScreen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#2e3328;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#e8dfc0;"><div id="loadingSpinner" style="width:38px;height:38px;border:4px solid rgba(255,255,255,.2);border-top-color:#c8b98a;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;"></div><h2 style="font-size:18px;font-weight:800;margin-bottom:6px;">מערכת שליטה בציוד</h2><p id="loadingMsg" style="font-size:12px;opacity:.7;margin-bottom:0;">מתחבר...</p><button id="loginBtn" onclick="if(window.doLogin)window.doLogin()" style="display:none;margin-top:16px;background:#c8b98a;color:#2e3328;border:none;padding:11px 24px;border-radius:10px;font-family:Heebo,sans-serif;font-size:14px;font-weight:700;cursor:pointer;align-items:center;gap:8px;"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> כניסה עם Google</button><p id="loginErr" style="display:none;color:#f5c6c0;font-size:11px;margin-top:9px;max-width:260px;text-align:center;"></p></div>
<header class="hdr">
  <div><div class="hdr-t">&#x1FA96; &#x05DE;&#x05E2;&#x05E8;&#x05DB;&#x05EA; &#x05E9;&#x05DC;&#x05D9;&#x05D8;&#x05D4; &#x05D1;&#x05E6;&#x05D9;&#x05D5;&#x05D3;</div><div class="hdr-s">&#x05E0;&#x05D9;&#x05D4;&#x05D5;&#x05DC; &#x05E6;&#x05D9;&#x05D5;&#x05D3; &#x05E4;&#x05DC;&#x05D5;&#x05D2;&#x05EA;&#x05D9; &#x05D5;&#x05D0;&#x05D9;&#x05E9;&#x05D9;</div></div>
  <span id="userNameEl" style="font-size:11px;opacity:.7;color:var(--sal);"></span><button id="signOutBtn" onclick="doSignOut()" style="display:none;background:rgba(255,255,255,.15);border:none;color:var(--sal);font-family:Heebo,sans-serif;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;cursor:pointer;margin-left:4px;">יציאה</button><span class="hbadge" id="hcount">...</span>
</header>

<nav class="nav">
  <button class="ntab active"  onclick="showS('s-sol',this)">&#x1F50D; &#x05D7;&#x05D9;&#x05D9;&#x05DC;</button>
  <button class="ntab"         onclick="showS('s-comp',this)">&#x1F4CB; &#x05DE;&#x05D7;&#x05DC;&#x05E7;&#x05D4;</button>
  <button class="ntab"         onclick="showS('s-nk',this)">&#x1F52B; &#x05E0;&#x05E9;&#x05E7;&#x05D9;&#x05D9;&#x05D4;</button>
  <button class="ntab"         onclick="showS('s-inv',this)">&#x1F4E6; &#x05D5;&#x05D9;&#x05E1;&#x05D5;&#x05EA;</button>
  <button class="ntab"         onclick="showS('s-dash',this)">&#x1F4CA; &#x05D3;&#x05E9;&#x05D1;&#x05D5;&#x05E8;&#x05D3;</button>
  <button class="ntab"         onclick="showS('s-new',this)">&#x2795; &#x05D7;&#x05D3;&#x05E9;</button>
  <button class="ntab" id="tab-report" onclick="showS('s-report',this)">📡 דיווח יומי</button>
  <button class="ntab" onclick="showS('s-platoon',this)">🏕️ ציוד פלוגתי</button>
  <button class="ntab" onclick="showS('s-ammo',this)">💥 תחמושת</button>
</nav>

<div class="scr on" id="s-sol">
  <div class="card">
    <h2 id="h-search"></h2>
    <div class="srow">
      <div class="fg"><label id="lbl-pick"></label>
        <select id="selSol" onchange="selectSol(this.value)"><option value=""></option></select>
      </div>
      <div class="fg"><label id="lbl-search"></label>
        <input id="srch" oninput="filterSols(this.value)">
      </div>
      <button class="btn bsec" id="btn-clear" onclick="clearSol()"></button>
    </div>
  </div>
  <div id="solView"></div>
</div>

<div class="scr" id="s-comp">
  <div class="card">
    <h2 id="h-comp"></h2>
    <div class="frow" id="platFilters"></div>
    <div class="cgrid" id="compGrid"></div>
  </div>
  <div class="card">
    <h3 id="h-logmiss"></h3>
    <div id="logMissT"></div>
  </div>
</div>

<div class="scr" id="s-nk">
  <div class="card">
    <h2 id="h-nk"></h2>
    <p id="p-nk" style="font-size:12px;color:var(--kh);margin-bottom:14px;"></p>
    <!-- Filter bar -->
    <div class="frow" id="nkFilters"></div>
    <!-- Item list + detail side by side on desktop -->
    <div id="nkLayout" style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;">
      <div id="nkItemList" style="flex:0 0 260px;min-width:220px;"></div>
      <div id="nkItemDetail" style="flex:1;min-width:280px;"></div>
    </div>
  </div>
</div>

<div class="scr" id="s-inv">
  <div class="card">
    <h2 id="h-inv"></h2>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <button class="btn bsec bsm" id="btn-inv-all" onclick="setInvF('all')"></button>
      <button class="btn bred bsm" id="btn-inv-miss" onclick="setInvF('miss')"></button>
      <button class="btn bgo bsm"  id="btn-inv-sur"  onclick="setInvF('sur')"></button>
    </div>
    <div id="invTable"></div>
  </div>
  <div class="card">
    <h3 id="h-transfer"></h3>
    <div style="display:flex;gap:9px;align-items:end;flex-wrap:wrap;">
      <div class="fg" style="flex:1;min-width:160px;"><label id="lbl-mv-item"></label>
        <select id="mvItem" onchange="buildMovSols()"><option value=""></option></select>
      </div>
      <div class="fg" style="flex:1;min-width:140px;"><label id="lbl-mv-from"></label>
        <select id="mvFrom"><option value=""></option></select>
      </div>
      <div class="fg" style="flex:1;min-width:140px;"><label id="lbl-mv-to"></label>
        <select id="mvTo"><option value=""></option></select>
      </div>
      <button class="btn bprim" id="btn-transfer" onclick="doTransfer()"></button>
    </div>
    <div id="mvLog" style="margin-top:12px;"></div>
  </div>
</div>

<div class="scr" id="s-dash">
  <div class="kgrid" id="kpiGrid"></div>
  <div class="card"><h3 id="h-platbreak"></h3><div id="platBreak"></div></div>
  <div class="card"><h3 id="h-missList"></h3><div id="missList"></div></div>
</div>

<div class="scr" id="s-new">
  <div class="card">
    <h2 id="h-new"></h2>
    <div class="fgrid">
      <div class="fg"><label id="lbl-name"></label><input id="nn"></div>
      <div class="fg"><label id="lbl-pid"></label><input id="np"></div>
      <div class="fg"><label id="lbl-plat"></label>
        <select id="npl">
          <option value="1">1</option><option value="2">2</option>
          <option value="3">3</option><option value="חפק">חפק</option><option value="מפלג">מפלג</option>
        </select>
      </div>
      <div class="fg"><label id="lbl-role"></label>
        <select id="nro">
          <option value="לוחם">לוחם</option><option value="קלע">קלע</option>
          <option value="נגב">נגב</option><option value="מטול">מטול</option>
          <option value="מאג">מאג</option><option value="חובש">חובש</option>
          <option value="מ&quot;מ">מ"מ</option><option value="מ&quot;כ">מ"כ</option>
          <option value="סמ&quot;פ">סמ"פ</option>
        </select>
      </div>
      <div class="fg"><label id="lbl-phone"></label><input id="nph"></div>
    </div>
    <hr class="sep">
    <button class="btn bprim" id="btn-save-sol" onclick="addSol()"></button>
  </div>
</div>

<div class="mover hide" id="mover">
  <div class="modal"><h3 id="mTitle"></h3><div id="mBody"></div><div class="mact" id="mAct"></div></div>
</div>

});

function el(id) { return document.getElementById(id); }
function h(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style') e.style.cssText = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if (children) {
    if (typeof children === 'string') e.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
    else e.appendChild(children);
  }
  return e;
}
function pill(text, ok, clickFn) {
  return h('button', {'class': 'pill ' + (ok ? 'pok' : 'pbad'), 'onclick': clickFn}, text);
}
function goSol(pid) {
  document.querySelectorAll('.scr').forEach(function(s) { s.classList.remove('on'); });
  document.querySelectorAll('.ntab').forEach(function(t) { t.classList.remove('active'); });
  el('s-sol').classList.add('on');
  document.querySelectorAll('.ntab')[0].classList.add('active');
  el('selSol').value = pid; selectSol(pid); window.scrollTo(0, 0);
}

// ══ DROPDOWN ══
function buildDrop(filter) {
  filter = filter || '';
  var sel = el('selSol'), cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  var fl = filter.toLowerCase();
  DB.soldiers
    .filter(function(s) { return !fl || s.name.indexOf(filter) >= 0 || s.pid.indexOf(filter) >= 0; })
    .sort(function(a, b) { return a.name.localeCompare(b.name, 'he'); })
    .forEach(function(s) {
      var o = document.createElement('option');
      o.value = s.pid;
      o.text = s.name + ' | ' + s.pid + ' | ' + T.plat + s.platoon;
      if (s.pid === cur) o.selected = true;
      sel.appendChild(o);
    });
  el('hcount').textContent = DB.soldiers.length + ' ' + T.soldiers;
}
function filterSols(v) {
  buildDrop(v);
  var f = DB.soldiers.filter(function(s) { return s.name.indexOf(v) >= 0 || s.pid.indexOf(v) >= 0; });
  if (f.length === 1) selectSol(f[0].pid);
}
function clearSol() {
  el('selSol').value = ''; el('srch').value = ''; el('solView').innerHTML = ''; buildDrop();
}
function selectSol(pid) {
  if (!pid) { el('solView').innerHTML = ''; return; }
  var s = getSol(pid); if (s) renderSolCard(s);
}

// ══ SOLDIER CARD — uses DOM, no innerHTML string building ══
function renderSolCard(s) {
  var v = el('solView');
  var nashkia = s.nashkia || {};
  var log = s.log || {};
  var ni = Object.keys(nashkia).length;
  var nok = Object.values(nashkia).filter(function(x) { return x.status === 'present'; }).length;
  var li = Object.keys(log).length;
  var lok = Object.values(log).filter(function(x) { return x.status === 'present'; }).length;
  var tot = ni + li, tokk = nok + lok;
  var pct = tot > 0 ? Math.round(tokk / tot * 100) : 100;
  var pctColor = pct === 100 ? 'var(--go)' : pct > 70 ? 'var(--am)' : 'var(--re)';

  v.innerHTML = '';
  var wrap = h('div', {style: 'border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px;'});

  // Header
  var hdr = h('div', {'class': 'sh'});
  var hdrL = h('div', {});

function renderSectionTitle(text) {
  return h('div', {'class': 'st'}, text);
}

function buildTable(headers, rows) {
  var tbl = h('table', {'class': 'tbl'});
  var thead = h('thead', {}); var tr = h('tr', {});
  headers.forEach(function(hd) { tr.appendChild(h('th', {}, hd)); });
  thead.appendChild(tr); tbl.appendChild(thead);
  var tbody = h('tbody', {});
  rows.forEach(function(row) {
    var r = h('tr', {});
    row.forEach(function(cell) {
      var td = h('td', {});
      if (cell === null || cell === undefined) {}
      else if (typeof cell === 'string' || typeof cell === 'number') td.textContent = String(cell);
      else td.appendChild(cell);
      r.appendChild(td);
    });
    tbody.appendChild(r);
  });
  tbl.appendChild(tbody);
  return tbl;
}

// ══ MUTATIONS ══
function upNMkt(pid, item, val) {
  var s = getSol(pid); if (!s) return;
  s.nashkia = s.nashkia || {};
  if (!s.nashkia[item]) s.nashkia[item] = {mkT: val, status: 'present'};
  else s.nashkia[item].mkT = val;
  saveDB(); toast('\u2713 \u05E2\u05D5\u05D3\u05DB\u05DF');
}
function cycleN(pid, item) {
  var s = getSol(pid); if (!s || !s.nashkia[item]) return;
  s.nashkia[item].status = s.nashkia[item].status === 'present' ? 'missing' : 'present';
  saveDB(); renderSolCard(s);
}
function delN(pid, item) {
  var s = getSol(pid); if (!s) return;
  if (!confirm(item + ' — ' + T.delConfirm)) return;
  delete s.nashkia[item]; saveDB(); renderSolCard(s); toast('\uD83D\uDDD1 \u05E0\u05DE\u05D7\u05E7');
}
function upLVal(pid, item, val) {
  var s = getSol(pid); if (!s) return;
  s.log = s.log || {};
  if (!s.log[item]) s.log[item] = {val: val, status: val === '\u05D0\u05D9\u05DF' ? 'missing' : 'present'};
  else { s.log[item].val = val; if (val === '\u05D0\u05D9\u05DF') s.log[item].status = 'missing'; }
  saveDB(); toast('\u2713 \u05E2\u05D5\u05D3\u05DB\u05DF');
}
function cycleL(pid, item) {
  var s = getSol(pid); if (!s) return;
  s.log = s.log || {};
  if (!s.log[item]) s.log[item] = {val: '—', status: 'present'};
  s.log[item].status = s.log[item].status === 'present' ? 'missing' : 'present';
  saveDB(); renderSolCard(s);
}
function cycleEx(pid, idx) {
  var s = getSol(pid); if (!s) return;
  var e = s.extra_items[idx]; if (!e) return;
  e.status = e.status === 'present' ? 'missing' : 'present';
  saveDB(); renderSolCard(s);
}
function delEx(pid, idx) {
  var s = getSol(pid); if (!s) return;
  s.extra_items.splice(idx, 1); saveDB(); renderSolCard(s); toast('\uD83D\uDDD1 \u05E0\u05DE\u05D7\u05E7');
}
function addDef(pid) {
  var inp = el('di_' + pid); var v = inp.value.trim(); if (!v) return;
  var s = getSol(pid); if (!s) return;
  s.deficiencies.push(v); inp.value = ''; saveDB(); renderSolCard(s);
}
function remDef(pid, idx) {
  var s = getSol(pid); if (!s) return;
  s.deficiencies.splice(idx, 1); saveDB(); renderSolCard(s);
}

// == NASHKIA DASHBOARD ==
var nkFlt = 'all', nkSelected = null;

function renderNK() {
  // Filter buttons
  var filtersEl = el('nkFilters'); filtersEl.innerHTML = '';
  ['all'].concat(PLATOONS).forEach(function(p) {
    filtersEl.appendChild(h('button', {'class': 'fb ' + (nkFlt === p ? 'active' : ''),
      'onclick': function() { setNKFlt(p); }}, p === 'all' ? T.all : T.plat + p));
  });

  // Build item -> soldiers map
  var sols = nkFlt === 'all' ? DB.soldiers : DB.soldiers.filter(function(s) { return s.platoon === nkFlt; });
  var imap = {};
  sols.forEach(function(s) {
    Object.entries(s.nashkia || {}).forEach(function(e) {
      if (!imap[e[0]]) imap[e[0]] = [];
      imap[e[0]].push({pid: s.pid, name: s.name, platoon: s.platoon, mkT: e[1].mkT, status: e[1].status});
    });
  });

  // Sort items by name
  var sorted = Object.keys(imap).sort();

  // Render item list
  var listEl = el('nkItemList'); listEl.innerHTML = '';
  if (!sorted.length) { listEl.appendChild(h('div', {'class': 'nd'}, T.noData)); el('nkItemDetail').innerHTML = ''; return; }

  var listWrap = h('div', {style: 'border:1px solid var(--bo);border-radius:var(--r);overflow:hidden;'});
  sorted.forEach(function(item) {
    var soldiers = imap[item];
    var ok = soldiers.filter(function(x) { return x.status === 'present'; }).length;
    var miss = soldiers.filter(function(x) { return x.status === 'missing'; }).length;
    var isActive = item === nkSelected;

    var row = h('div', {
      'class': 'nk-list-row' + (isActive ? ' nk-list-active' : ''),
      'onclick': function() { nkSelected = item; renderNK(); }
    });

    var left = h('div', {style: 'display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;'});
    left.appendChild(h('span', {style: 'font-size:13px;font-weight:700;color:var(--old);'}, item));

    var badges = h('div', {style: 'display:flex;gap:5px;margin-top:3px;'});
    var cntBadge = h('span', {style: 'background:var(--ol);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;'}, String(soldiers.length));
    badges.appendChild(cntBadge);
    if (ok > 0) badges.appendChild(h('span', {style: 'background:#e8f4e8;color:var(--go);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;'}, '\u2705 ' + ok));
    if (miss > 0) badges.appendChild(h('span', {style: 'background:#fde8e6;color:var(--re);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;'}, '\u274C ' + miss));
    left.appendChild(badges);

    row.appendChild(left);
    row.appendChild(h('span', {style: 'color:var(--kh);font-size:18px;'}, '❯'));
    listWrap.appendChild(row);
  });
  listEl.appendChild(listWrap);

  // Show detail for selected item
  if (nkSelected && imap[nkSelected]) {
    showNkDetail(nkSelected, imap[nkSelected]);
  } else if (sorted.length > 0) {
    // Auto-select first
    nkSelected = sorted[0];
    showNkDetail(nkSelected, imap[nkSelected]);
    renderNK(); // re-render to highlight
    return;
  }
}

function showNkDetail(item, soldiers) {
  var detail = el('nkItemDetail'); detail.innerHTML = '';
  if (!soldiers || !soldiers.length) { detail.appendChild(h('div', {'class': 'nd'}, T.noData)); return; }

  var ok = soldiers.filter(function(x) { return x.status === 'present'; }).length;
  var miss = soldiers.filter(function(x) { return x.status === 'missing'; }).length;

  // Header
  var hdr = h('div', {style: 'margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--bo);'});
  hdr.appendChild(h('div', {style: 'font-size:18px;font-weight:900;color:var(--old);margin-bottom:6px;'}, item));
  var badges = h('div', {style: 'display:flex;gap:8px;flex-wrap:wrap;'});
  badges.appendChild(h('span', {style: 'background:var(--ol);color:#fff;font-size:12px;font-weight:700;padding:3px 11px;border-radius:12px;'}, String(soldiers.length) + ' ' + T.soldiers));
  if (ok > 0) badges.appendChild(h('span', {style: 'background:#e8f4e8;color:var(--go);font-size:12px;font-weight:700;padding:3px 11px;border-radius:12px;'}, '\u2705 ' + ok + ' ' + T.present));
  if (miss > 0) badges.appendChild(h('span', {style: 'background:#fde8e6;color:var(--re);font-size:12px;font-weight:700;padding:3px 11px;border-radius:12px;'}, '\u274C ' + miss + ' ' + T.missing));
  hdr.appendChild(badges);
  detail.appendChild(hdr);

  // Table: soldier, platoon, mkt, status
  detail.appendChild(buildTable(
    [T.lblName, T.platCol, T.mktCol, T.statusCol],
    soldiers.sort(function(a, b) { return a.platoon.localeCompare(b.platoon); }).map(function(sol) {
      var nameEl = h('strong', {style: 'cursor:pointer;color:var(--ol);text-decoration:underline;',
        'onclick': function() { goSol(sol.pid); }}, sol.name);

      var statusEl = h('span', {'class': 'pill ' + (sol.status === 'present' ? 'pok' : 'pbad')},
        sol.status === 'present' ? '\u2705 ' + T.present : '\u274C ' + T.missing);
      return [nameEl, T.plat + sol.platoon, mktEl, statusEl];
    })
  ));
}

      }
      var prev=document.getElementById('upload-preview');if(prev)prev.innerHTML='';
      if(!toAdd.length){if(prev)prev.innerHTML='<div class="nd">\u05D0\u05D9\u05DF \u05D7\u05D9\u05D9\u05DC\u05D9\u05DD \u05D7\u05D3\u05E9\u05D9\u05DD'+(already.length?' ('+already.length+' \u05E7\u05D9\u05D9\u05DE\u05D9\u05DD)':'')+'</div>';return;}
      var info=document.createElement('div');info.style.cssText='background:var(--sap);border-radius:8px;padding:12px;margin-top:12px;';info.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--old);margin-bottom:8px;">'+toAdd.length+' \u05D7\u05D9\u05D9\u05DC\u05D9\u05DD \u05DC\u05D9\u05D9\u05D1\u05D5\u05D0</div>';
      var btn=document.createElement('button');btn.className='btn bprim';btn.textContent='\u05D9\u05D9\u05D1\u05D0 '+toAdd.length+' \u05D7\u05D9\u05D9\u05DC\u05D9\u05DD';
      btn.onclick=function(){var db=_DB();toAdd.forEach(function(s){db.soldiers.push(s);});_saveDB();if(window._buildDrop2)window._buildDrop2();_toast('\u05D9\u05D5\u05D1\u05D0\u05D5 '+toAdd.length+' \u05D7\u05D9\u05D9\u05DC\u05D9\u05DD');if(prev)prev.innerHTML='';input.value='';};
      info.appendChild(btn);if(prev)prev.appendChild(info);
    }catch(err){alert('\u05E9\u05D2\u05D9\u05D0\u05D4: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

</script>
